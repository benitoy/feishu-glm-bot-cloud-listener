name: Feishu GLM bot cloud listener

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. Run every 4 hours and let concurrency replace
    # the previous listener, so the Feishu long-connection is kept alive in
    # the cloud without relying on the local Codex computer.
    - cron: "17 */4 * * *"

concurrency:
  group: feishu-glm-bot-cloud-listener
  cancel-in-progress: true

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 250
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Feishu CLI
        run: npm install -g @larksuite/cli

      - name: Configure Feishu CLI bot identity
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          printf '%s' "$FEISHU_APP_SECRET" | lark-cli config init --app-id "$FEISHU_APP_ID" --app-secret-stdin --brand feishu
          lark-cli auth status --json --verify

      - name: Run cloud listener bridge
        env:
          BRIDGE_SHARED_SECRET: ${{ secrets.BRIDGE_SHARED_SECRET }}
          BRIDGE_URL: ${{ vars.BRIDGE_URL }}
          FEISHU_EVENT_KEY: im.message.receive_v1
          LARKSUITE_CLI_NO_UPDATE_NOTIFIER: "1"
          LARKSUITE_CLI_NO_SKILLS_NOTIFIER: "1"
        run: node scripts/feishu-glm-long-connection-bridge.mjs
